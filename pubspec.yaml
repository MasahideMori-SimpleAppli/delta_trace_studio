name: delta_trace_studio
description: "The official open source editor for DeltaTraceDB."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # official packages
  intl: any
  flutter_launcher_icons: ^0.14.4
  web: ^1.1.1
  file_selector: ^1.0.3
  url_launcher: ^6.1.5

  # original packages
  simple_locale: any
  file_state_manager: any
  delta_trace_db: 0.1.6

  # other packages
  uuid: ^4.5.1
  pointycastle: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  simple_lint: ^2.0.0

flutter:
  generate: true
  uses-material-design: true


  fonts:
    - family: Noto Sans JP
      fonts:
        - asset: assets/fonts/Noto_Sans_JP/NotoSansJP-VariableFont_wght.ttf
        - asset: assets/fonts/Noto_Sans_JP/NotoSansJP-Regular.ttf
          weight: 400
    - family: Noto Sans Mono
      fonts:
        - asset: assets/fonts/Noto_Sans_Mono/static/NotoSansMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/Noto_Sans_Mono/static/NotoSansMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/Noto_Sans_Mono/static/NotoSansMono-Bold.ttf
          weight: 700